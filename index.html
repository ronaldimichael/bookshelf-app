<!doctype html>
<html lang="en">
  <head>
    <meta
      name="description"
      content="Bookshelf App adalah aplikasi manajemen buku sederhana berbasis web untuk menambahkan, mengedit, mencari, dan mengatur buku ke dalam rak selesai dan belum selesai dibaca."
    />
    <meta
      name="keywords"
      content="Bookshelf App, aplikasi buku, manajemen buku, rak buku online, JavaScript localStorage project"
    />
    <meta name="author" content="Ronaldi Maekel Bang" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#222831" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bookshelf App - Manajemen Buku Modern" />
    <meta
      property="og:description"
      content="Kelola buku favoritmu dengan mudah. Tambah, edit, cari, dan atur buku dalam rak selesai & belum selesai dibaca."
    />
    <meta property="og:locale" content="id_ID" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Bookshelf App - Manajemen Buku Modern"
    />
    <meta
      name="twitter:description"
      content="Aplikasi rak buku berbasis web dengan fitur tambah, edit, pencarian, dan penyimpanan localStorage."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bookshelf App - Manajemen Buku Modern" />
    <meta
      property="og:description"
      content="Kelola buku favoritmu dengan mudah. Tambah, edit, cari, dan atur buku dalam rak selesai & belum selesai dibaca."
    />
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Bookshelf App - Ronaldi Bang</title>
    <script defer src="main.js"></script>
  </head>
  <body>
    <header class="app-title">
      <a href="index.html"><h1>Bookshelf App</h1></a>
      <section class="search_book">
        <form id="searchBook" data-testid="searchBookForm">
          <label for="searchBookTitle">Cari Judul:</label>
          <input
            placeholder="Masukan Judul Buku"
            id="searchBookTitle"
            type="text"
            data-testid="searchBookFormTitleInput"
          />
          <button
            id="searchSubmit"
            type="submit"
            data-testid="searchBookFormSubmitButton"
          >
            Cari
          </button>
        </form>
      </section>
    </header>

    <main>
      <section class="input_section">
        <h2>Tambah Buku Baru</h2>
        <form id="bookForm" data-testid="bookForm">
          <div class="input">
            <label for="bookFormTitle">Judul</label>
            <input
              id="bookFormTitle"
              type="text"
              required
              data-testid="bookFormTitleInput"
            />
          </div>
          <div class="input">
            <label for="bookFormAuthor">Penulis</label>
            <input
              id="bookFormAuthor"
              type="text"
              required
              data-testid="bookFormAuthorInput"
            />
          </div>
          <div class="input">
            <label for="bookFormYear">Tahun</label>
            <input
              id="bookFormYear"
              type="number"
              required
              data-testid="bookFormYearInput"
            />
          </div>
          <div class="input-checkbox">
            <label for="bookFormIsComplete">Selesai dibaca</label>
            <input
              id="bookFormIsComplete"
              type="checkbox"
              data-testid="bookFormIsCompleteCheckbox"
            />
          </div>
          <button
            id="bookFormSubmit"
            type="submit"
            data-testid="bookFormSubmitButton"
          >
            Masukkan Buku ke rak <span>Belum selesai dibaca</span>
          </button>
        </form>
      </section>
      <section class="book_shelf">
        <section class="incomplete_shelf">
          <h3>Belum selesai dibaca</h3>

          <div id="incompleteBookList" data-testid="incompleteBookList">
            <div data-bookid="123123123" data-testid="bookItem">
              <h3 data-testid="bookItemTitle">Judul Buku 1</h3>
              <p data-testid="bookItemAuthor">Penulis: Penulis Buku 1</p>
              <p data-testid="bookItemYear">Tahun: 2030</p>
              <div class="book-btn">
                <button data-testid="bookItemIsCompleteButton">
                  Selesai dibaca
                </button>
                <button data-testid="bookItemDeleteButton">Hapus Buku</button>
                <button data-testid="bookItemEditButton">Edit Buku</button>
              </div>
            </div>
          </div>
        </section>

        <section class="completed_shelf">
          <h3>Selesai dibaca</h3>

          <div id="completeBookList" data-testid="completeBookList">
            <div data-bookid="456456456" data-testid="bookItem">
              <h3 data-testid="bookItemTitle">Judul Buku 2</h3>
              <p data-testid="bookItemAuthor">Penulis: Penulis Buku 2</p>
              <p data-testid="bookItemYear">Tahun: 2030</p>
              <div class="book-btn">
                <button data-testid="bookItemIsCompleteButton">
                  Selesai dibaca
                </button>
                <button data-testid="bookItemDeleteButton">Hapus Buku</button>
                <button data-testid="bookItemEditButton">Edit Buku</button>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
